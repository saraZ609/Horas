<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Horas Extra</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#FAFAF7;--surface:#FFFFFF;--border:#E8E6DF;--border2:#D3D1C7;
    --text:#2C2C2A;--muted:#888780;--accent:#0F6E56;--accent-light:#E1F5EE;
    --accent2:#1D9E75;--warn:#BA7517;--warn-bg:#FAEEDA;
    --danger:#A32D2D;--danger-bg:#FCEBEB;--r:10px;--r2:16px;
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .app{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
  header{margin-bottom:2rem;border-bottom:1px solid var(--border);padding-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .logo{font-family:'Fraunces',serif;font-size:24px;font-weight:300;letter-spacing:-0.5px}
  .logo span{color:var(--accent);font-style:italic}
  .subtitle{color:var(--muted);font-size:12px;margin-top:3px}
  .tabs{display:flex;gap:4px;background:var(--border);border-radius:var(--r);padding:4px;margin-bottom:2rem}
  .tab{flex:1;padding:8px 12px;border:none;background:transparent;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--muted);transition:all .2s;font-weight:400}
  .tab.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;margin-bottom:1.25rem}
  .card-title{font-size:15px;font-weight:500;margin-bottom:1rem}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:400}
  input,select{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);transition:border-color .15s;outline:none}
  input:focus,select:focus{border-color:var(--accent)}
  .field{margin-bottom:1rem}
  .btn{padding:9px 18px;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#0a5a45}
  .btn-primary:disabled{background:var(--border2);cursor:not-allowed;color:#aaa}
  .btn-secondary{background:transparent;border:1px solid var(--border2);color:var(--text)}
  .btn-secondary:hover{background:var(--bg)}
  .btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid #F7C1C1}
  .btn-warn{background:var(--warn-bg);color:var(--warn);border:1px solid #FAC775}
  .btn-full{width:100%}
  .hours-selector{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
  .hours-group{background:var(--bg);border-radius:var(--r);padding:12px}
  .hours-label{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
  .hours-btns{display:flex;flex-wrap:wrap;gap:5px}
  .hbtn{padding:5px 11px;border:1px solid var(--border2);border-radius:6px;font-size:12px;cursor:pointer;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;transition:all .15s}
  .hbtn:hover{border-color:var(--accent2);color:var(--accent)}
  .hbtn.sel{background:var(--accent-light);border-color:var(--accent2);color:var(--accent);font-weight:500}
  .total-display{text-align:center;padding:14px;background:var(--accent-light);border-radius:var(--r);border:1px solid #9FE1CB;margin-bottom:1rem}
  .total-num{font-size:30px;font-weight:300;font-family:'Fraunces',serif;color:var(--accent)}
  .total-lbl{font-size:12px;color:var(--accent2);margin-top:2px}
  .user-badge{display:flex;align-items:center;gap:10px;background:var(--accent-light);border:1px solid #9FE1CB;border-radius:var(--r);padding:10px 14px;margin-bottom:1rem}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;flex-shrink:0}
  .user-info{flex:1}
  .user-name{font-size:14px;font-weight:500}
  .user-email{font-size:11px;color:var(--muted)}
  .btn-logout{background:transparent;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:4px 8px;border-radius:5px}
  .btn-logout:hover{background:var(--border);color:var(--text)}
  .entries-list{display:flex;flex-direction:column;gap:7px}
  .entry-item{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--bg);border-radius:var(--r);border:1px solid var(--border)}
  .entry-date{font-size:13px;font-weight:500}
  .entry-hours{font-size:13px;color:var(--accent);font-weight:500}
  .entry-user{font-size:11px;color:var(--muted)}
  .entry-delete{background:none;border:none;color:#F09595;cursor:pointer;font-size:17px;padding:2px 7px;border-radius:5px;line-height:1}
  .entry-delete:hover{background:var(--danger-bg)}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
  .stat{background:var(--bg);border-radius:var(--r);padding:12px;text-align:center}
  .stat-val{font-size:20px;font-weight:300;font-family:'Fraunces',serif}
  .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
  .alert{padding:9px 13px;border-radius:var(--r);font-size:13px;margin-bottom:.75rem}
  .alert-success{background:var(--accent-light);border:1px solid #9FE1CB;color:var(--accent)}
  .alert-error{background:var(--danger-bg);border:1px solid #F7C1C1;color:var(--danger)}
  .alert-warn{background:var(--warn-bg);border:1px solid #FAC775;color:var(--warn)}
  .empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
  .divider{height:1px;background:var(--border);margin:.75rem 0}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
  .spinner-dark{border-color:rgba(0,0,0,.15);border-top-color:var(--accent)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-overlay{text-align:center;padding:2.5rem;color:var(--muted);font-size:13px}

  /* Selector de mes */
  .month-tabs{display:flex;gap:4px;margin-bottom:1.25rem}
  .mtab{flex:1;padding:8px;border:1px solid var(--border2);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;background:var(--surface);color:var(--muted);text-align:center;transition:all .15s}
  .mtab:hover{border-color:var(--accent2);color:var(--accent)}
  .mtab.active{background:var(--accent-light);border-color:var(--accent2);color:var(--accent);font-weight:500}
  .mtab.closed-badge::after{content:'cerrado';font-size:10px;background:var(--danger-bg);color:var(--danger);border-radius:4px;padding:1px 5px;margin-left:6px;font-weight:500}

  /* Banner mes cerrado */
  .closed-banner{background:var(--danger-bg);border:1px solid #F7C1C1;border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:1rem;display:flex;align-items:center;gap:8px}

  /* Pantalla de acceso */
  #access-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:1.5rem}
  .access-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center}
  .access-logo{font-family:'Fraunces',serif;font-size:28px;font-weight:300;margin-bottom:6px}
  .access-logo span{color:var(--accent);font-style:italic}
  .access-sub{font-size:13px;color:var(--muted);margin-bottom:2rem;line-height:1.5}
  .access-box .field input{text-align:center;letter-spacing:2px;font-size:15px}
  .shake{animation:shake .4s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  @media(max-width:600px){.hours-selector{grid-template-columns:1fr}.stat-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- ── Pantalla de acceso ─────────────────────────── -->
<div id="access-screen">
  <div class="access-box">
    <div class="access-logo">Horas <span>Extra</span></div>
    <div class="access-sub">Introduce la contraseña para acceder a la aplicación</div>
    <div class="field">
      <input type="password" id="app-pass-input" placeholder="Contraseña"
             onkeydown="if(event.key==='Enter')checkAppPass()" autofocus />
    </div>
    <div id="app-pass-alert" style="min-height:22px;font-size:13px;color:var(--danger);margin-bottom:10px"></div>
    <button class="btn btn-primary btn-full" onclick="checkAppPass()">Entrar</button>
  </div>
</div>

<!-- ── App principal ──────────────────────────────── -->
<div class="app" id="main-app" style="display:none">
  <header>
    <div>
      <div class="logo">Horas <span>Extra</span></div>
      <div class="subtitle" id="header-sub"></div>
    </div>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="showTab('registro')">Registrar</button>
    <button class="tab" onclick="showTab('resumen');initResumen()">Mis registros</button>
    <button class="tab" onclick="showTab('admin');initAdmin()">Administración</button>
  </div>
  <div id="tab-registro"></div>
  <div id="tab-resumen" style="display:none"></div>
  <div id="tab-admin"   style="display:none"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIGURACIÓN — edita solo estas líneas
// ═══════════════════════════════════════════════════════
const API_URL    = 'https://script.google.com/macros/s/AKfycbxWYXrRa9PFpNqT3tlm_bqPOAtn551RhHCe1BNKCQ34O9RERn1AYPxbw99rEqe15fg_Eg/exec';
const ADMIN_PASS = 'RRHHZafan';          // Contraseña del administrador
const APP_PASS   = 'trabajadores2026';  // Contraseña de entrada para los trabajadores
const HR_EMAIL   = 'administracion@zafan.es';  // Correo destino del informe mensual
// ═══════════════════════════════════════════════════════

// ── Estado global ──────────────────────────────────────
let currentUser    = null;
let selHours       = 0;
let selMinutes     = 0;
let selectedDate   = todayStr();
let adminAuthed    = false;
let adminEntries   = [];
let closedMonths   = [];      // meses cerrados: ['2025-04', '2025-05', ...]
let adminViewMonth = currentMonth();  // mes que ve el admin en su panel
let resumeViewMonth = currentMonth(); // mes que ve el trabajador en su resumen

try { const u = sessionStorage.getItem('hx_user'); if(u) currentUser = JSON.parse(u); } catch{}

// ── Helpers de fecha ───────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function currentMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function prevMonth() {
  const d = new Date();
  d.setMonth(d.getMonth() - 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthName(ym) {
  const [y,m] = ym.split('-');
  return new Date(y, parseInt(m)-1, 1).toLocaleString('es-ES', {month:'long', year:'numeric'});
}
function normalizeDate(d) {
  if(!d) return '';
  const s = String(d).trim();
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)) { const [dd,mm,yyyy]=s.split('/'); return `${yyyy}-${mm}-${dd}`; }
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0,10);
  if(/^\d+$/.test(s)) {
    const ep = new Date(1899,11,30); ep.setDate(ep.getDate()+parseInt(s));
    return `${ep.getFullYear()}-${String(ep.getMonth()+1).padStart(2,'0')}-${String(ep.getDate()).padStart(2,'0')}`;
  }
  try { const p=new Date(s); if(!isNaN(p)) return `${p.getFullYear()}-${String(p.getMonth()+1).padStart(2,'0')}-${String(p.getDate()).padStart(2,'0')}`; } catch{}
  return s;
}
function formatDate(d) {
  const iso = normalizeDate(d);
  if(!iso || iso.length<10) return String(d||'');
  const [y,m,day] = iso.split('-');
  return `${day}/${m}/${y}`;
}
function formatHours(h) {
  h = parseFloat(h)||0;
  const hrs=Math.floor(h), mins=Math.round((h-hrs)*60);
  return mins===0 ? `${hrs}h` : `${hrs}h ${mins}min`;
}
function isMonthClosed(ym) { return closedMonths.includes(ym); }

// ── API ────────────────────────────────────────────────
async function api(body) {
  const r = await fetch(API_URL, {
    method:'POST', redirect:'follow',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(body)
  });
  const text = await r.text();
  try { return JSON.parse(text); }
  catch { throw new Error('Respuesta inesperada: '+text.substring(0,120)); }
}

// ── Sesión ─────────────────────────────────────────────
function setUser(u) { currentUser=u; try{sessionStorage.setItem('hx_user',JSON.stringify(u));}catch{} }
function logout() {
  currentUser=null; try{sessionStorage.removeItem('hx_user');}catch{}
  selHours=0; selMinutes=0; selectedDate=todayStr();
  renderRegistro();
}
function showAlert(id,msg,type,autohide=true) {
  const el=document.getElementById(id); if(!el) return;
  el.innerHTML=`<div class="alert alert-${type}">${msg}</div>`;
  if(autohide&&type==='success') setTimeout(()=>{if(el)el.innerHTML='';},3500);
}
function showTab(t) {
  ['registro','resumen','admin'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.classList.toggle('active',['registro','resumen','admin'][i]===t);
  });
}

// ── Pantalla de acceso ─────────────────────────────────
function checkAppPass() {
  const val = document.getElementById('app-pass-input')?.value||'';
  if(val===APP_PASS) {
    try{sessionStorage.setItem('hx_app_auth','1');}catch{}
    document.getElementById('access-screen').style.display='none';
    document.getElementById('main-app').style.display='block';
    appInit();
  } else {
    const box=document.querySelector('.access-box');
    box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake');
    document.getElementById('app-pass-alert').textContent='Contraseña incorrecta';
    document.getElementById('app-pass-input').value='';
  }
}

async function appInit() {
  document.getElementById('header-sub').textContent='Cargando...';
  try {
    const res = await api({action:'getClosedMonths'});
    if(res.ok) closedMonths = res.months||[];
  } catch{}
  document.getElementById('header-sub').textContent=
    `Mes en curso: ${monthName(currentMonth())}${isMonthClosed(currentMonth())?' · cerrado':''}`;
  renderRegistro();
}

// ════════════════════════════════════════════════════════
//  TAB REGISTRAR
// ════════════════════════════════════════════════════════
function renderRegistro() {
  const el = document.getElementById('tab-registro');
  if(!el) return;

  if(!currentUser) {
    el.innerHTML=`
      <div class="card">
        <div class="card-title">Identificación del trabajador</div>
        <div class="field"><label>Nombre completo</label>
          <input type="text" id="reg-name" placeholder="Tu nombre completo"
                 onkeydown="if(event.key==='Enter')document.getElementById('reg-email').focus()"/></div>
        <div class="field"><label>Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tu@email.com"
                 onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <div id="reg-alert"></div>
        <button class="btn btn-primary btn-full" onclick="doLogin()">Acceder</button>
      </div>`;
    return;
  }

  const initials = currentUser.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  const curMonth = currentMonth();
  const isClosed = isMonthClosed(curMonth);
  const totalLabel = selMinutes===0?`${selHours}h`:`${selHours}h ${selMinutes}min`;

  let html=`
    <div class="user-badge">
      <div class="avatar">${initials}</div>
      <div class="user-info">
        <div class="user-name">${currentUser.name}</div>
        <div class="user-email">${currentUser.email}</div>
      </div>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>`;

  if(isClosed) {
    html+=`<div class="closed-banner">⚠ El mes de ${monthName(curMonth)} está cerrado por administración. No se pueden añadir nuevos registros.</div>`;
  } else {
    html+=`
      <div class="card">
        <div class="card-title">Registrar horas extra — ${monthName(curMonth)}</div>
        <div class="field">
          <label>Fecha (solo mes en curso)</label>
          <input type="date" id="entry-date" value="${selectedDate}"
                 min="${curMonth}-01" max="${todayStr()}"
                 onchange="selectedDate=this.value;updateTotalDisplay()"/>
        </div>
        <div class="hours-selector">
          <div class="hours-group" id="hg-horas">
            <div class="hours-label">Horas</div>
            <div class="hours-btns">
              ${[0,1,2,3,4,5,6,7,8].map(h=>
                `<button class="hbtn${selHours===h?' sel':''}" onclick="selH(${h})">${h}h</button>`
              ).join('')}
            </div>
          </div>
          <div class="hours-group" id="hg-minutos">
            <div class="hours-label">Minutos</div>
            <div class="hours-btns">
              ${[0,15,30,45].map(m=>
                `<button class="hbtn${selMinutes===m?' sel':''}" onclick="selM(${m})">${m===0?'0 min':m+' min'}</button>`
              ).join('')}
            </div>
          </div>
        </div>
        <div class="total-display">
          <div class="total-num" id="total-num">${totalLabel}</div>
          <div class="total-lbl" id="total-lbl">horas extra a registrar el ${formatDate(selectedDate)}</div>
        </div>
        <div id="entry-alert"></div>
        <button class="btn btn-primary btn-full" id="btn-save" onclick="addEntry()">Guardar registro</button>
      </div>`;
  }

  html+=`
    <div class="card">
      <div class="card-title">Mis registros de ${monthName(curMonth)}</div>
      <div id="my-entries">
        <div class="loading-overlay"><span class="spinner spinner-dark"></span> Cargando...</div>
      </div>
    </div>`;

  el.innerHTML=html;
  loadMyEntries(curMonth, 'my-entries', true);
}

function selH(h) {
  selHours=h;
  document.querySelectorAll('#hg-horas .hbtn').forEach((b,i)=>b.classList.toggle('sel',i===h));
  updateTotalDisplay();
}
function selM(m) {
  selMinutes=m;
  const idx=[0,15,30,45].indexOf(m);
  document.querySelectorAll('#hg-minutos .hbtn').forEach((b,i)=>b.classList.toggle('sel',i===idx));
  updateTotalDisplay();
}
function updateTotalDisplay() {
  const lbl=selMinutes===0?`${selHours}h`:`${selHours}h ${selMinutes}min`;
  const n=document.getElementById('total-num'), l=document.getElementById('total-lbl');
  if(n) n.textContent=lbl;
  if(l) l.textContent=`horas extra a registrar el ${formatDate(selectedDate)}`;
}

function doLogin() {
  const name=document.getElementById('reg-name')?.value?.trim();
  const email=document.getElementById('reg-email')?.value?.trim();
  if(!name||name.length<2){showAlert('reg-alert','Introduce tu nombre completo.','error',false);return;}
  if(!email||!email.includes('@')){showAlert('reg-alert','Introduce un correo válido.','error',false);return;}
  setUser({name,email}); renderRegistro();
}

async function loadMyEntries(month, containerId, canDelete) {
  const el=document.getElementById(containerId);
  if(!el||!currentUser) return;
  try {
    const res=await api({action:'getMyEntries',email:currentUser.email});
    if(!res.ok){el.innerHTML=`<div class="alert alert-error">Error: ${res.error||'desconocido'}</div>`;return;}
    const entries=(res.entries||[])
      .map(e=>({...e,dateNorm:normalizeDate(e.date)}))
      .filter(e=>e.dateNorm.startsWith(month))
      .sort((a,b)=>b.dateNorm.localeCompare(a.dateNorm));
    if(entries.length===0){el.innerHTML=`<div class="empty">Sin registros en ${monthName(month)}.</div>`;return;}
    const total=entries.reduce((s,e)=>s+parseFloat(e.hours||0),0);
    let html=`<div style="font-size:13px;color:var(--muted);margin-bottom:10px">
      Total: <strong style="color:var(--accent)">${formatHours(total)}</strong>
    </div><div class="entries-list">`;
    for(const e of entries) {
      html+=`<div class="entry-item">
        <div class="entry-date">${formatDate(e.date)}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="entry-hours">${formatHours(e.hours)}</div>
          ${canDelete&&!isMonthClosed(month)?`<button class="entry-delete" onclick="deleteMyEntry('${e.id}')" title="Eliminar">×</button>`:''}
        </div>
      </div>`;
    }
    el.innerHTML=html+'</div>';
  } catch(err){
    el.innerHTML=`<div class="alert alert-error">Error de conexión: ${err.message}</div>`;
  }
}

async function addEntry() {
  const total=selHours+(selMinutes/60);
  if(total===0){showAlert('entry-alert','Selecciona al menos 15 minutos.','error',false);return;}
  const date=selectedDate||todayStr();
  // Verificar que la fecha pertenece al mes en curso
  if(!date.startsWith(currentMonth())){
    showAlert('entry-alert','Solo puedes registrar horas del mes en curso.','error',false);return;
  }
  if(isMonthClosed(currentMonth())){
    showAlert('entry-alert','El mes actual está cerrado.','error',false);return;
  }
  const btn=document.getElementById('btn-save');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Guardando...';}
  try {
    const res=await api({
      action:'addEntry',id:Date.now().toString(),
      name:currentUser.name,email:currentUser.email,
      date,hours:total,ts:new Date().toISOString()
    });
    if(res.ok){
      selHours=0;selMinutes=0;selectedDate=todayStr();
      renderRegistro();
      setTimeout(()=>showAlert('entry-alert','✓ Registro guardado correctamente.','success'),50);
    } else {
      showAlert('entry-alert',res.error||'Error al guardar.','error',false);
      if(btn){btn.disabled=false;btn.innerHTML='Guardar registro';}
    }
  } catch(err){
    showAlert('entry-alert',`Error: ${err.message}`,'error',false);
    if(btn){btn.disabled=false;btn.innerHTML='Guardar registro';}
  }
}

async function deleteMyEntry(id) {
  if(!confirm('¿Eliminar este registro?')) return;
  try {
    const res=await api({action:'deleteEntry',id,email:currentUser.email});
    if(res.ok) loadMyEntries(currentMonth(),'my-entries',true);
    else alert('No se pudo eliminar: '+(res.error||''));
  } catch(err){alert('Error: '+err.message);}
}

// ════════════════════════════════════════════════════════
//  TAB MIS REGISTROS (trabajador — mes actual + anterior)
// ════════════════════════════════════════════════════════
function initResumen() {
  resumeViewMonth = currentMonth();
  renderResumen();
}

function renderResumen() {
  const el=document.getElementById('tab-resumen');
  if(!currentUser) {
    el.innerHTML=`<div class="card"><div class="empty">Identifícate primero en la pestaña "Registrar".</div></div>`;
    return;
  }
  const cur=currentMonth(), prev=prevMonth();
  const initials=currentUser.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

  let html=`
    <div class="user-badge" style="margin-bottom:1.25rem">
      <div class="avatar">${initials}</div>
      <div class="user-info">
        <div class="user-name">${currentUser.name}</div>
        <div class="user-email">${currentUser.email}</div>
      </div>
    </div>
    <div class="month-tabs">
      <div class="mtab${resumeViewMonth===cur?' active':''}${isMonthClosed(cur)?' closed-badge':''}"
           onclick="resumeViewMonth='${cur}';renderResumen()">
        ${monthName(cur)}
      </div>
      <div class="mtab${resumeViewMonth===prev?' active':''}${isMonthClosed(prev)?' closed-badge':''}"
           onclick="resumeViewMonth='${prev}';renderResumen()">
        ${monthName(prev)}
      </div>
    </div>`;

  const canDel = !isMonthClosed(resumeViewMonth) && resumeViewMonth===cur;
  if(isMonthClosed(resumeViewMonth)) {
    html+=`<div class="closed-banner">⚠ ${monthName(resumeViewMonth)} está cerrado — solo lectura.</div>`;
  }

  html+=`
    <div class="card">
      <div class="card-title">Registros de ${monthName(resumeViewMonth)}</div>
      <div id="resumen-entries">
        <div class="loading-overlay"><span class="spinner spinner-dark"></span> Cargando...</div>
      </div>
    </div>`;

  el.innerHTML=html;
  loadResumenEntries(resumeViewMonth, canDel);
}

async function loadResumenEntries(month, canDelete) {
  const el=document.getElementById('resumen-entries');
  if(!el||!currentUser) return;
  try {
    const res=await api({action:'getMyEntries',email:currentUser.email});
    if(!res.ok){el.innerHTML=`<div class="alert alert-error">Error: ${res.error}</div>`;return;}
    const entries=(res.entries||[])
      .map(e=>({...e,dateNorm:normalizeDate(e.date)}))
      .filter(e=>e.dateNorm.startsWith(month))
      .sort((a,b)=>b.dateNorm.localeCompare(a.dateNorm));
    const total=entries.reduce((s,e)=>s+parseFloat(e.hours||0),0);

    // Stats
    let html=`<div class="stat-grid">
      <div class="stat"><div class="stat-val">${formatHours(total)}</div><div class="stat-lbl">total</div></div>
      <div class="stat"><div class="stat-val">${entries.length}</div><div class="stat-lbl">días</div></div>
      <div class="stat"><div class="stat-val">${entries.length>0?formatHours(total/entries.length):'—'}</div><div class="stat-lbl">media/día</div></div>
    </div>`;

    if(entries.length===0){
      html+=`<div class="empty">Sin registros en ${monthName(month)}.</div>`;
    } else {
      html+=`<div class="entries-list">`;
      for(const e of entries)
        html+=`<div class="entry-item">
          <div class="entry-date">${formatDate(e.date)}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="entry-hours">${formatHours(e.hours)}</div>
            ${canDelete?`<button class="entry-delete" onclick="deleteResumenEntry('${e.id}')" title="Eliminar">×</button>`:''}
          </div>
        </div>`;
      html+=`</div>`;
    }
    el.innerHTML=html;
  } catch(err){
    el.innerHTML=`<div class="alert alert-error">Error: ${err.message}</div>`;
  }
}

async function deleteResumenEntry(id) {
  if(!confirm('¿Eliminar este registro?')) return;
  try {
    const res=await api({action:'deleteEntry',id,email:currentUser.email});
    if(res.ok) loadResumenEntries(resumeViewMonth, true);
    else alert('No se pudo eliminar: '+(res.error||''));
  } catch(err){alert('Error: '+err.message);}
}

// ════════════════════════════════════════════════════════
//  TAB ADMINISTRACIÓN
// ════════════════════════════════════════════════════════
function initAdmin() {
  adminViewMonth = currentMonth();
  renderAdmin();
}

function renderAdmin() {
  const el=document.getElementById('tab-admin');
  if(!adminAuthed) {
    el.innerHTML=`
      <div class="card">
        <div class="card-title">Acceso de administración</div>
        <div class="field"><label>Contraseña</label>
          <input type="password" id="admin-pass" placeholder="Contraseña de administrador"
                 onkeydown="if(event.key==='Enter')authAdmin()"/></div>
        <div id="admin-alert"></div>
        <button class="btn btn-primary btn-full" onclick="authAdmin()">Entrar</button>
      </div>`;
    return;
  }

  const cur=currentMonth(), prev=prevMonth();

  let html=`
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
        Panel de administración
        <button class="btn btn-secondary" style="font-size:12px;padding:5px 11px"
                onclick="adminAuthed=false;renderAdmin()">Salir</button>
      </div>

      <!-- Selector de mes -->
      <div class="month-tabs" style="margin-bottom:1rem">
        <div class="mtab${adminViewMonth===cur?' active':''}${isMonthClosed(cur)?' closed-badge':''}"
             onclick="adminViewMonth='${cur}';reloadAdminView()">
          ${monthName(cur)}
        </div>
        <div class="mtab${adminViewMonth===prev?' active':''}${isMonthClosed(prev)?' closed-badge':''}"
             onclick="adminViewMonth='${prev}';reloadAdminView()">
          ${monthName(prev)}
        </div>
      </div>

      <div class="stat-grid" id="admin-stats">
        <div class="stat"><div class="stat-val">…</div><div class="stat-lbl">trabajadores</div></div>
        <div class="stat"><div class="stat-val">…</div><div class="stat-lbl">horas totales</div></div>
        <div class="stat"><div class="stat-val">…</div><div class="stat-lbl">registros</div></div>
      </div>

      <div class="actions" id="admin-actions">
        <button class="btn btn-warn" onclick="exportExcel()">⬇ Exportar Excel</button>
        <button class="btn btn-warn" onclick="sendEmail()">✉ Enviar informe</button>
        ${!isMonthClosed(adminViewMonth)
          ? `<button class="btn btn-danger" onclick="confirmCloseMonth()">🔒 Cerrar mes</button>`
          : `<span style="font-size:12px;color:var(--danger);padding:8px 4px;align-self:center">✓ Mes cerrado</span>`
        }
      </div>
    </div>

    <div class="card">
      <div class="card-title">Registros de ${monthName(adminViewMonth)}</div>
      <div id="admin-entries">
        <div class="loading-overlay"><span class="spinner spinner-dark"></span> Cargando...</div>
      </div>
    </div>`;

  el.innerHTML=html;
  loadAdminEntries();
}

function reloadAdminView() {
  // Redibujar solo la parte dinámica sin perder la autenticación
  renderAdmin();
}

function authAdmin() {
  const pass=document.getElementById('admin-pass')?.value;
  if(pass===ADMIN_PASS){adminAuthed=true;renderAdmin();}
  else showAlert('admin-alert','Contraseña incorrecta.','error',false);
}

async function loadAdminEntries() {
  const listEl=document.getElementById('admin-entries');
  const statsEl=document.getElementById('admin-stats');
  try {
    const res=await api({action:'getAllEntries',pass:ADMIN_PASS});
    if(!res.ok){if(listEl)listEl.innerHTML=`<div class="alert alert-error">Error: ${res.error}</div>`;return;}

    const month=adminViewMonth;
    adminEntries=(res.entries||[])
      .map(e=>({...e,dateNorm:normalizeDate(e.date)}))
      .filter(e=>e.dateNorm.startsWith(month));

    // Stats
    const byPerson={};
    for(const e of adminEntries){
      if(!byPerson[e.email]) byPerson[e.email]={name:e.name,total:0};
      byPerson[e.email].total+=parseFloat(e.hours||0);
    }
    const totalH=adminEntries.reduce((s,e)=>s+parseFloat(e.hours||0),0);
    if(statsEl) statsEl.innerHTML=`
      <div class="stat"><div class="stat-val">${Object.keys(byPerson).length}</div><div class="stat-lbl">trabajadores</div></div>
      <div class="stat"><div class="stat-val">${formatHours(totalH)}</div><div class="stat-lbl">horas totales</div></div>
      <div class="stat"><div class="stat-val">${adminEntries.length}</div><div class="stat-lbl">registros</div></div>`;

    if(adminEntries.length===0){
      if(listEl) listEl.innerHTML=`<div class="empty">No hay registros en ${monthName(month)}.</div>`;
      return;
    }

    const sorted=[...adminEntries].sort((a,b)=>a.name.localeCompare(b.name)||b.dateNorm.localeCompare(a.dateNorm));
    let html=`<div class="entries-list">`;
    for(const e of sorted)
      html+=`<div class="entry-item">
        <div>
          <div class="entry-date">${e.name} — ${formatDate(e.date)}</div>
          <div class="entry-user">${e.email}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="entry-hours">${formatHours(e.hours)}</div>
          <button class="entry-delete" onclick="adminDelete('${e.id}')" title="Eliminar">×</button>
        </div>
      </div>`;
    if(listEl) listEl.innerHTML=html+'</div>';
  } catch(err){
    if(listEl) listEl.innerHTML=`<div class="alert alert-error">Error: ${err.message}</div>`;
  }
}

async function adminDelete(id) {
  if(!confirm('¿Eliminar este registro?')) return;
  try {
    const res=await api({action:'adminDeleteEntry',id,pass:ADMIN_PASS});
    if(res.ok) loadAdminEntries();
    else alert('No se pudo eliminar: '+(res.error||''));
  } catch(err){alert('Error: '+err.message);}
}

async function confirmCloseMonth() {
  const mn=monthName(adminViewMonth);
  if(!confirm(`¿Cerrar el mes de ${mn}?\n\nUna vez cerrado, ningún trabajador podrá añadir ni modificar registros de ese mes.\n\nAsegúrate de exportar el Excel antes si lo necesitas.`)) return;
  try {
    const res=await api({action:'closeMonth',month:adminViewMonth,pass:ADMIN_PASS});
    if(res.ok){
      closedMonths.push(adminViewMonth);
      // Actualizar cabecera
      document.getElementById('header-sub').textContent=
        `Mes en curso: ${monthName(currentMonth())}${isMonthClosed(currentMonth())?' · cerrado':''}`;
      alert(`✓ Mes de ${mn} cerrado correctamente.`);
      renderAdmin();
    } else {
      alert('Error al cerrar mes: '+(res.error||''));
    }
  } catch(err){alert('Error: '+err.message);}
}

// ── Excel ──────────────────────────────────────────────
function exportExcel() {
  if(adminEntries.length===0){alert('No hay registros para exportar.');return;}
  function doExport() {
    const wb=XLSX.utils.book_new();
    const byPerson={};
    for(const e of adminEntries){
      if(!byPerson[e.email]) byPerson[e.email]={name:e.name,email:e.email,entries:[]};
      byPerson[e.email].entries.push(e);
    }
    const people=Object.values(byPerson).sort((a,b)=>a.name.localeCompare(b.name));
    const mName=monthName(adminViewMonth).toUpperCase();

    // Hoja resumen
    const sum=[['RESUMEN DE HORAS EXTRA — '+mName],[''],['Trabajador','Correo','Días','Total horas']];
    let grand=0;
    for(const p of people){
      const t=p.entries.reduce((s,e)=>s+parseFloat(e.hours||0),0); grand+=t;
      sum.push([p.name,p.email,p.entries.length,parseFloat(t.toFixed(2))]);
    }
    sum.push(['','','TOTAL GENERAL',parseFloat(grand.toFixed(2))]);
    const ws1=XLSX.utils.aoa_to_sheet(sum);
    ws1['!cols']=[{wch:28},{wch:30},{wch:10},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws1,'Resumen');

    // Hoja detalle
    const det=[['DETALLE — '+mName],[''],['Trabajador','Correo','Fecha','Horas','Decimal']];
    for(const e of [...adminEntries].sort((a,b)=>a.name.localeCompare(b.name)||a.dateNorm.localeCompare(b.dateNorm)))
      det.push([e.name,e.email,formatDate(e.date),formatHours(parseFloat(e.hours||0)),parseFloat(parseFloat(e.hours||0).toFixed(2))]);
    const ws2=XLSX.utils.aoa_to_sheet(det);
    ws2['!cols']=[{wch:28},{wch:30},{wch:12},{wch:12},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws2,'Detalle');

    // Hoja por persona
    for(const p of people){
      const pd=[[p.name+' — '+monthName(adminViewMonth)],['Correo: '+p.email],[''],['Fecha','Horas','Decimal']];
      for(const e of [...p.entries].sort((a,b)=>a.dateNorm.localeCompare(b.dateNorm)))
        pd.push([formatDate(e.date),formatHours(parseFloat(e.hours||0)),parseFloat(parseFloat(e.hours||0).toFixed(2))]);
      const t=p.entries.reduce((s,e)=>s+parseFloat(e.hours||0),0);
      pd.push(['','TOTAL',parseFloat(t.toFixed(2))]);
      const wsp=XLSX.utils.aoa_to_sheet(pd);
      wsp['!cols']=[{wch:14},{wch:12},{wch:12}];
      XLSX.utils.book_append_sheet(wb,wsp,p.name.substring(0,28).replace(/[:\\\/\?\*\[\]]/g,'_'));
    }
    XLSX.writeFile(wb,`horas_extra_${adminViewMonth}.xlsx`);
  }
  if(typeof XLSX!=='undefined'){doExport();}
  else {
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload=doExport;
    s.onerror=()=>alert('No se pudo cargar la librería Excel.');
    document.head.appendChild(s);
  }
}

function sendEmail() {
  exportExcel();
  const byPerson={};
  for(const e of adminEntries){
    if(!byPerson[e.email]) byPerson[e.email]={name:e.name,total:0,days:0};
    byPerson[e.email].total+=parseFloat(e.hours||0);
    byPerson[e.email].days++;
  }
  let body=`Informe de horas extra — ${monthName(adminViewMonth)}\n\n`;
  body+=`Trabajadores: ${Object.keys(byPerson).length} | Registros: ${adminEntries.length}\n\n`;
  body+=`RESUMEN:\n${'─'.repeat(40)}\n`;
  for(const p of Object.values(byPerson))
    body+=`${p.name}: ${formatHours(p.total)} (${p.days} día${p.days!==1?'s':''})\n`;
  body+=`\n${'─'.repeat(40)}\nAdjunta el archivo horas_extra_${adminViewMonth}.xlsx descargado.`;
  window.open(`mailto:${HR_EMAIL}?subject=${encodeURIComponent('Horas Extra — '+monthName(adminViewMonth))}&body=${encodeURIComponent(body)}`,'_blank');
}
